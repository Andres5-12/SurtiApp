# 1. URL de conexi\u00F3n usando el host del pooler y el puerto 5432
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require

# 2. El usuario completo con el sufijo de tu proyecto (obligatorio para el pooler)
spring.datasource.username=postgres.hminzzhnhdaftokwtghj

# 3. Tu contrase\u00F1a
spring.datasource.password=Contabilidad12345

# 4. Propiedades de JPA e Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Limitar el n\u00FAmero m\u00E1ximo de conexiones que crear\u00E1 este backend en Render
spring.datasource.hikari.maximum-pool-size=3

# N\u00FAmero m\u00EDnimo de conexiones inactivas que mantendr\u00E1 abiertas (reducido a 1)
spring.datasource.hikari.minimum-idle=1

# Tiempo m\u00E1ximo en milisegundos que esperar\u00E1 el backend para obtener una conexi\u00F3n antes de dar error
spring.datasource.hikari.connection-timeout=30000

# Tiempo m\u00E1ximo que una conexi\u00F3n puede estar inactiva en el pool antes de cerrarse
spring.datasource.hikari.idle-timeout=600000